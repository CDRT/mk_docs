site_name: Lenovo CDRT Docs Site
site_url: https://docs.lenovocdrt.com/

theme:
  name: material
  logo: img/CDRT-REV-Red_s.png
  favicon: img/fav/favicon.ico
  font:
    text: Noto Sans
    code: Roboto Mono
  features:
    - navigation.indexes
    - navigation.tracking
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.code.select
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: blue
      accent: light blue
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: black
      accent: blue grey

nav:
  - Home: 'index.md'
  - Product Guides:
    - Commercial Vantage:
      - Overview: guides/lcv/index.md
      - What's New: guides/lcv/whatsnew.md
      - Deployment : guides/lcv/deployment.md
      - Configuration : guides/lcv/configuration.md
      - Upgrading : guides/lcv/upgrading.md
      - SU Helper Reference: guides/lcv/suhelper.md
      - Commercial Vantage FAQ: guides/lcv/commercial_vantage_faq.md
    - ThinkVantage PowerShell Library:
      - Overview: guides/thinkvantage/tv-pslib-overview.md
      - Think BIOS Config Tool V2:
        - Overview: guides/tbct_v2/tbct_v2_top.md
        - Module Reference: guides/tbct_v2/tbc_module_reference.md
      - Lenovo BIOS Certificate Tool:
        - Overview: guides/lbct/index.md
        - Module Reference: guides/lbct/lbc_module_reference.md
      - Lenovo Client Scripting Module:
        - Overview: guides/lcsm/lcsm_top.md
      - Lenovo Client Update Module:
        - Overview: guides/lcu/index.md
        - Getting Started:
          - Installation: guides/lcu/getting-started/installation.md
          - Quick Start: guides/lcu/getting-started/quick-start.md
        - Migration Guide:
          - LSU Client vs Lenovo Client Update: guides/lcu/comparison.md
        - Functions:
          - Expand-LnvUpdate: guides/lcu/functions/expand-lnvupdate.md
          - Get-LnvDownload: guides/lcu/functions/get-lnvdownload.md
          - Get-LnvUpdate: guides/lcu/functions/get-lnvupdate.md
          - Get-LnvUpdateConfiguration: guides/lcu/functions/get-lnvupdateconfiguration.md
          - Get-LnvUpdateFromWMI: guides/lcu/functions/get-lnvupdatefromwmi.md
          - Get-LnvUpdateHist: guides/lcu/functions/get-lnvupdatehist.md
          - Get-LnvUpdateSummary: guides/lcu/functions/get-lnvupdatesummary.md
          - Get-LnvUpdatesRepo: guides/lcu/functions/get-lnvupdatesrepo.md
          - Install-LnvUpdate: guides/lcu/functions/install-lnvupdate.md
          - Save-LnvUpdate: guides/lcu/functions/save-lnvupdate.md
          - Set-LnvUpdateConfiguration: guides/lcu/functions/set-lnvupdateconfiguration.md
      - ThinkVantage Repository Manager:
        - Overview: guides/tvrm/index.md
        - Module Reference: guides/tvrm/module_reference.md
    - Lenovo Updates Catalog:
      - Overview: guides/luc/luc_ovrvw.md
      - guides/luc/luc_agnt.md
      - guides/luc/luc_ts.md
    - Dock Manager:
      - Overview: guides/dm/index.md
      - Deployment Guide: guides/dm/dm.md
      - Managing with Intune: guides/dm/dm_manage_intune.md
      - Troubleshooting: guides/dm/dm_troubleshooting.md
      - Dock Manager FAQ: guides/dm/dock_manager_faq.md
    - System Update - Update Retriever - Thin Installer:
      - Overview: guides/sus/index.md
      - Deployment Guide:
        - guides/sus/su_dg/index.md
        - guides/sus/su_dg/su_dg_ch1.md
        - guides/sus/su_dg/su_dg_ch2.md
        - guides/sus/su_dg/su_dg_ch3.md
        - guides/sus/su_dg/su_dg_ch4.md
        - guides/sus/su_dg/su_dg_ch5.md
        - guides/sus/su_dg/su_dg_ch6.md
        - guides/sus/su_dg/su_dg_ch7.md
        - guides/sus/su_dg/su_dg_ch8.md
      - System Update FAQ: guides/sus/system_update_faq.md
    - Lenovo View:
      - guides/lenovo_view/index.md
  - References:
    - BIOS Reference:
      - ref/bios/index.md
      - ref/bios/bios_guide.md
      - WMI BIOS Interface: ref/bios/wmi/wmi_guide.md
      - BIOS Settings Dictionary:                                                             │
│         - ref/bios/settings/index.md          # section landing (navigation.indexes)          │
│         - ThinkPad: ref/bios/settings/thinkpad                                                │
│         - ThinkCentre: ref/bios/settings/thinkcentre                                          │
│         - ThinkStation: ref/bios/settings/thinkstation
      - Glossary: ref/bios/glossary.md
      - BIOS Logging: ref/bios/settings/bios_logging.md
      - System Deployment Boot Mode: ref/bios/sdbm.md
      - Startup Interrupt Menu: ref/bios/startup_menu.md
    - Docks Reference:
      - ref/docks/index.md
      - Deployment Guide: ref/docks/docks_main.md
      - Configuration Manager Queries: ref/docks/configmgr_dock_queries.md
    - AMD DASH: ref/dash/index.md
    - Scripting Samples: ref/scripts/samples.md
  - Frequently Asked Questions:
    - System Update FAQ: guides/sus/system_update_faq.md
    - Commercial Vantage FAQ: guides/lcv/commercial_vantage_faq.md
    - Dock Manager FAQ: guides/dm/dock_manager_faq.md

plugins:
  - search
  - open-in-new-tab
  - redirects:
      redirect_maps:
        'guides/tbct/tbct_top.md': 'guides/tbct_v2/tbct_v2_top.md'
        'guides/cv/index.md' : 'guides/lcv/index.md'
  - awesome-nav

markdown_extensions:
  - admonition
  - tables
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: ......span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.keys
  - toc:
      permalink: "#"

extra:
  analytics:
    provider: google
    property: G-Q3G8XPJ5GY
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences such as light and dark mode, as well as to measure anonymous usage data to determine effectiveness of our documentation and whether users find what they're searching for. With your consent, you're helping us to make our documentation better.
    actions:
      - accept
      - reject

copyright: |
  &copy; 2026 <a href="https://docs.lenovocdrt.com"  target="_blank" rel="noopener">Lenovo Commercial Deployment Readiness Team</a><br><a href="#__consent" style="text-decoration:underline;">Change cookie settings</a>

extra_css :
  - stylesheets/extra.css
