name: ci 
on:
  push:
    branches:
      - main

# mkdocs gh-deploy pushes the built site to the gh-pages branch,
# so the workflow needs write access to repo contents.
permissions:
  contents: write

# If several commits land quickly, cancel superseded runs.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
          
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v5
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install MkDocs Material and plugins
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-open-in-new-tab mkdocs-redirects
 
      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --clean
